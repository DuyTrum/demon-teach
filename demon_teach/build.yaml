targets:
  $default:
    builders:
      json_serializable:
        options:
          any_map: false
          checked: true
          create_to_json: true
          disallow_unrecognized_keys: false
          explicit_to_json: true
          field_rename: snake
          include_if_null: false
      
      freezed:
        options:
          union_key: type
          union_value_case: pascal
      
      riverpod_generator:
        options:
          # Riverpod generator options
          
      drift_dev:
        options:
          store_date_time_values_as_text: true
